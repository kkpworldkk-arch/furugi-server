<!DOCTYPE html>
<html lang="ja">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="全国の古着屋を地図で探せるアプリ。口コミ・営業時間・ジャンルで絞り込み可能。">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="古着屋マップ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <!-- Railway APIへの接続を先読み -->
  <link rel="preconnect" href="https://web-production-632bbc.up.railway.app">
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>

  <title>古着屋マップ</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-icon {
      font-size: 48px;
    }
    .loading-title {
      font-family: sans-serif;
      font-size: 20px;
      font-weight: bold;
      color: #5D4037;
      letter-spacing: 0.05em;
    }
    .loading-subtitle {
      font-family: sans-serif;
      font-size: 13px;
      color: #9E9E9E;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #F5F0EB;
      border-top-color: #5D4037;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAsmjE6Ao7RqzKyp2oZ-YtUp5AXDTJGHeE" async defer></script>
</head>
<body>
  <!-- Flutterが起動するまで表示するローディング画面 -->
  <div id="loading-screen">
    <div class="loading-icon">👗</div>
    <div class="loading-title">古着屋マップ</div>
    <div class="spinner"></div>
    <div class="loading-subtitle">読み込み中...</div>
  </div>

  <script>
    // Flutterの最初のフレームが描画されたらローディング画面を非表示
    window.addEventListener('flutter-first-frame', function () {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(function () { screen.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
